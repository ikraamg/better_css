<!doctype html><html><head><style>* { margin: 0; }</style></head><body>
<!-- unconditional off-screen: no clipping/scrolling ancestor, must stay flagged -->
<a href="#" id="off-unconditional" style="position:absolute;left:-9999px;display:block;width:50px;height:24px">off unconditional</a>
<!-- off-screen but reachable inside an overflow-x:auto ancestor: scrollable means reachable, not flagged -->
<div style="width:200px;height:24px;overflow-x:auto">
  <div style="width:2000px;display:flex">
    <a href="#" id="off-scrolled" style="display:block;width:50px;height:24px;margin-left:1900px">off in scroller</a>
  </div>
</div>
</body></html>
