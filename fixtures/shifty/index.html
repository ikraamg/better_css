<!doctype html><html><head><style>
* { margin: 0; box-sizing: border-box; }
</style></head><body>
<img class="photo" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" style="display:block;width:100%;height:200px;background:#ccc;">
<script>
// Deterministic (setTimeout, not network) so the shift's timing bucket and the
// attributed element are assertable. img.photo has no width/height ATTRIBUTES
// (only CSS sizing), so it also exercises the intrinsic-size suspect heuristic.
setTimeout(function () {
  var ad = document.createElement('div')
  ad.style.height = '200px'
  ad.style.background = 'tomato'
  document.body.insertBefore(ad, document.querySelector('.photo'))
}, 300)
</script>
</body></html>
