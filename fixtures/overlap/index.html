<!doctype html><html><head><style>
* { margin: 0; }
header { height: 64px; background: #eee; }
/* .oops: absolute positioning is itself a layering opt-in now (position != static,
   regardless of z-index) — visually it still sits under the header, but that's now
   read as intentional, not an authoring accident. Negative case. */
.oops { position: absolute; top: 10px; left: 10px; width: 200px; height: 100px; background: tomato; }
.modal { position: absolute; top: 10px; left: 400px; width: 200px; height: 100px; z-index: 10; background: teal; }
.under { position: absolute; top: 10px; left: 400px; width: 300px; height: 200px; background: #ccc; }
/* genuine authoring accident: two static, unpositioned grid items explicitly placed
   into the same cell. No position/transform/negative-margin opt-in anywhere. */
.grid-pair { display: grid; grid-template-columns: 200px; grid-template-rows: 80px; }
.cell-a, .cell-b { grid-row: 1; grid-column: 1; width: 150px; height: 60px; }
.cell-a { background: gold; }
.cell-b { background: plum; }
/* dedup coverage, reworked for the new semantics: three static grid items (in-flow,
   no position opt-in) spanning overlapping column ranges. dedup-a and dedup-b are
   adjacent (touching, not overlapping); dedup-c spans both and overlaps each — it
   must be reported once, not twice. */
.grid-dedup { display: grid; grid-template-columns: repeat(4, 100px); grid-template-rows: 100px; }
.dedup-a { grid-column: 1 / 3; grid-row: 1; background: gold; }
.dedup-b { grid-column: 3 / 5; grid-row: 1; background: plum; }
.dedup-c { grid-column: 2 / 4; grid-row: 1; background: olive; }
</style></head><body>
<header></header>
<div class="oops"></div>
<div class="under"></div>
<div class="modal"></div>
<div class="grid-pair">
  <div class="cell-a"></div>
  <div class="cell-b"></div>
</div>
<div class="grid-dedup">
  <div class="dedup-a"></div>
  <div class="dedup-b"></div>
  <div class="dedup-c"></div>
</div>
</body></html>
