<!doctype html><html><head><style>
* { margin: 0; }
header { height: 64px; background: #eee; }
.oops { position: absolute; top: 10px; left: 10px; width: 200px; height: 100px; background: tomato; }
.modal { position: absolute; top: 10px; left: 400px; width: 200px; height: 100px; z-index: 10; background: teal; }
.under { position: absolute; top: 10px; left: 400px; width: 300px; height: 200px; background: #ccc; }
.x { position: absolute; top: 300px; left: 10px; width: 40px; height: 40px; background: gold; }
.y { position: absolute; top: 300px; left: 200px; width: 40px; height: 40px; background: plum; }
.z { position: absolute; top: 290px; left: 0; width: 300px; height: 60px; background: olive; }
</style></head><body>
<header></header>
<div class="oops"></div>
<div class="under"></div>
<div class="modal"></div>
<div class="x"></div>
<div class="y"></div>
<div class="z"></div>
</body></html>
