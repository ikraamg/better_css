<!doctype html>
<html><head><style>
* { margin: 0; box-sizing: border-box; font-family: monospace; }
header { display: flex; align-items: center; gap: 8px; padding: 12px; }
a.nav { display: flex; align-items: center; justify-content: center; min-width: 44px; min-height: 32px; padding: 4px 8px; background: #eee; }
main { display: flex; flex-wrap: wrap; gap: 12px; padding: 12px; }
.card { flex: 1 1 220px; min-width: 0; padding: 12px; background: #f5f5f5; }
.card h2 { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style></head>
<body>
<header><a class="nav" href="#">Home</a><a class="nav" href="#">Docs</a></header>
<main>
<div class="card"><h2>A heading long enough to need ellipsis on narrow viewports</h2><p>Fluid body copy.</p></div>
<div class="card"><h2>Second card</h2><p>More copy.</p></div>
</main>
</body></html>
