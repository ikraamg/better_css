name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Every suite shutdown narrates its kill phases to stderr (src/core/connect.ts's
      # doShutdown) — CI-only Chrome leaks must arrive self-explaining. Quiet for users.
      CSSTRUTH_DEBUG_SHUTDOWN: '1'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npx vitest run
      - run: npm run build
